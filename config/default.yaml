/**:
    ros__parameters:
        max_iteration: 16
        filter_size_surf: 0.3
        filter_size_map: 0.3
        cube_side_length: 60.0
        map_file_path: "./test.pcd"

        common:
            lid_topic:  "/sonar_point_cloud"
            imu_topic:  "/auv/imu/data_raw"
            world_frame: "World"

            world_to_camera_init_T: [ -2.5231126653215394, -4.198916600709732, -1.9162049228024167 ]
            world_to_camera_init_R: [  0.85322300, -0.52145800, -0.01295800,
                          0.52134200,  0.85331600, -0.01143000,
                          0.01701800,  0.00299800,  0.99985100 ]

            imu_rate_hz: 100.0
            lidar_timeout: 0.25
            gravity_m_s2: 9.8

        preprocess:
            blind: 0.2

        mapping:
            noiseless_imu: false
            imu_gyro_scale: [ 1.0, 1.0, 1.3514 ]
            acc_cov: 0.001
            gyr_cov: 1e-6
            laser_point_cov: 1e-5
            fov_degree:    90.0
            det_range:     15.0
            extrinsic_T: [ 0.09382, -0.02148, 0.11593 ]
            extrinsic_R: [ 0.994521895, 0.0, 0.104528463,
                0.0,         1.0, 0.0,
                -0.104528463, 0.0, 0.994521895 ]

        dvl:
            enable: true
            topic: "/auv/dvl"
            extrinsic_T: [ -0.079, -0.09691, -0.25938 ]
            extrinsic_R: [ 1., 0., 0.,
                           0., 1., 0.,
                           0., 0., 1. ]
            dvl_timeout: 0.25

        pressure:
            enable: true
            topic: "/auv/pressure/scaled2"
            extrinsic_T: [ -0.24219, -0.03954, 0.01898 ]
            pressure_timeout: 0.25

        magnetometer:
            enable: true
            topic: "/auv/imu/magnetic_field"

            # In raw-count units, not Tesla.
            # Estimated from your calibrated mag_debug.csv using the corrected World frame.
            earth_field_world: [ 96.8, 313.7, 519.1 ]

            # Raw hard-iron offset in the original /auv/imu/magnetic_field axes.
            # bx_cal = bx_raw - 120.0
            # by_cal = by_raw - (-50.0) = by_raw + 50.0
            hard_iron_offset: [ 120.0, -50.0, 0.0 ]

            #Tested
            # mx = -bx_cal
            # my = -by_cal
            # mz = -bz_cal
            soft_iron_matrix: [ -1., 0., 0.,
                                0., -1., 0.,
                                0., 0., -1. ]

            mag_cov: 1849.0
            b_mag_init_cov: 1000000.0
            b_mag_proc_cov: 0.001
            innovation_gate_sigma: 3.0
            mag_timeout: 0.25

        publish:
            path_en:  false
            scan_publish_en:  true
            dense_publish_en: true
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: true
            interval: -1
