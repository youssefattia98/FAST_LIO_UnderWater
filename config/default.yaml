/**:
    ros__parameters:
        max_iteration: 3
        filter_size_surf: 0.5
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "./test.pcd"

        common:
            lid_topic:  "/points_raw"
            imu_topic:  "/imu/data"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            blind: 0.2

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    90.0
            det_range:     15.0
            extrinsic_est_en:  false
            extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]
            extrinsic_R: [ 1., 0., 0.,
                        0., 1., 0.,
                        0., 0., 1.]

        publish:
            path_en:  false
            scan_publish_en:  true
            dense_publish_en: true
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: true
            interval: -1
