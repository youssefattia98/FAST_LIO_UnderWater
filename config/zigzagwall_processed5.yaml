/**:
    ros__parameters:
        # Maximum IEKF scan-to-map correction iterations per LiDAR/sonar frame.
        max_iteration: 16
        # Voxel leaf size in meters for downsampling the current scan before matching.
        filter_size_surf: 0.3
        # Voxel leaf size in meters for downsampling points inserted into the map/ikd-tree.
        filter_size_map: 0.3
        cube_side_length: 60.0
        map_file_path: "./test.pcd"

        common:
            lid_topic:  "/sonar_point_cloud"               
            imu_topic:  "/auv/imu/data_raw"
            world_frame: "World"
            

            # zigzagwall_processed5
            world_to_camera_init_T: [ -2.4879, -4.1801, -1.55 ]
            world_to_camera_init_R: [
                0.7364, -0.6765, -0.0117,
                0.6763,  0.7365, -0.0142,
                0.0182,  0.0025,  0.9998
                ]

            imu_rate_hz: 200.0
            lidar_timeout: 0.25
            gravity_m_s2: 9.8

        preprocess:
            blind: 0.2

        mapping:
            noiseless_imu: false
            obs_manager_sonar_timeout: 0.0
            obs_manager_ramp_time: 0.0
            obs_manager_freeze_cov: 1.0e-10
            imu_gyro_scale: [ 1.0, 1.0, 1.0 ]


            b_acc_cov: 0.001
            b_gyr_cov: 0.0001
            init_b_acc_cov: 0.001
            init_b_gyr_cov: 0.0001
            init_grav_cov: 0.00001


            acc_cov: 0.1
            gyr_cov: 0.000001
            laser_point_cov: 1e-5
            fov_degree:    90.0
            det_range:     15.0
            extrinsic_T: [ 0.09382, -0.02148, 0.11593 ]
            extrinsic_R: [ 0.994521895, 0.0, 0.104528463,
                0.0,         1.0, 0.0,
                -0.104528463, 0.0, 0.994521895 ]

        dvl:
            enable: true
            topic: "/auv/dvl"
            extrinsic_T: [ -0.079, -0.09691, -0.25938 ]
            extrinsic_R: [ 1., 0., 0.,
                           0., 1., 0.,
                           0., 0., 1. ]
            dvl_timeout: 0.55
            velocity_cov: 5.0e-5
            innovation_gate_sigma: 0.0
            # Keep DVL bias fixed near zero in no-sonar mode so velocity cannot be hidden in b_dvl.
            bias_init_cov: 1.0e-10

        pressure:
            enable: true
            topic: "/auv/pressure/scaled2"
            extrinsic_T: [ -0.24219, -0.03954, 0.01898 ]
            surface_pressure: 103967.0
            pressure_timeout: 0.25
            pressure_cov: 1.0e8
            innovation_gate_sigma: 3.0

        magnetometer:
            enable: false
            topic: "/auv/imu/magnetic_field"
            earth_field_imu: [ -242.6, 224.6, 530.6 ]
            hard_iron_offset: [ 120.0, -50.0, 0.0 ]
            soft_iron_matrix: [ -1., 0., 0.,
                                0., -1., 0.,
                                0., 0., -1. ]
            mag_cov: 100.0
            b_mag_init_cov: 1.0e6
            b_mag_proc_cov: 0.001
            innovation_gate_sigma: 3.0
            mag_timeout: 0.25

        publish:
            path_en:  false
            scan_publish_en:  true
            dense_publish_en: true
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: false
            interval: -1
