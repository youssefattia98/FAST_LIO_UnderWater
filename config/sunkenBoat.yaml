/**:
    ros__parameters:
        max_iteration: 16
        filter_size_surf: 0.3
        filter_size_map: 0.3
        cube_side_length: 60.0
        map_file_path: "./test.pcd"

        common:
            lid_topic:  "/sonar_point_cloud"
            imu_topic:  "/auv/imu/data_raw"
            world_frame: "World"

            # sunkenBoat
            world_to_camera_init_T: [ -44.37502272860865, -54.60079722615101, -7.555725864138332 ]
            world_to_camera_init_R: [
                            0.3869, -0.9216,  0.0330,
                            0.9220,  0.3872,  0.0075,
                            -0.0198,  0.0278,  0.9994
                            ]
            gravity_m_s2: 9.8

        preprocess:
            blind: 0.2

        mapping:
            noiseless_imu: false
            obs_manager_sonar_timeout: 1.0
            obs_manager_ramp_time: 2.0
            obs_manager_freeze_cov: 1.0e-10
            imu_gyro_scale: [ 1.0, 1.0, 1.0 ]

            b_acc_cov: 0.001
            b_gyr_cov: 0.001
            init_b_acc_cov: 0.001
            init_b_gyr_cov: 0.1
            init_grav_cov: 0.00001

            acc_cov: 0.1
            gyr_cov: 1e-6
            laser_point_cov: 1e-5
            fov_degree:    90.0
            det_range:     15.0
            extrinsic_T: [ 0.09382, -0.02148, 0.11593 ]
            extrinsic_R: [ 0.994521895, 0.0, 0.104528463,
                0.0,         1.0, 0.0,
                -0.104528463, 0.0, 0.994521895 ]

        dvl:
            enable: false
            topic: "/auv/dvl"
            extrinsic_T: [ -0.079, -0.09691, -0.25938 ]
            extrinsic_R: [ 1., 0., 0.,
                           0., 1., 0.,
                           0., 0., 1. ]
            dvl_timeout: 0.55
            velocity_cov: 5.0e-5
            innovation_gate_sigma: 0.0
            bias_init_cov: 1.0e-10

        pressure:
            enable: true
            topic: "/auv/pressure/scaled2"
            extrinsic_T: [ -0.24219, -0.03954, 0.01898 ]
            pressure_timeout: 0.25
            pressure_cov: 1.0e8
            bias_init_cov: 1.0e4
            innovation_gate_sigma: 3.0

        magnetometer:
            enable: false
            topic: "/auv/imu/magnetic_field"
            hard_iron_offset: [ -0.30, -19.96, 86.70 ]
            soft_iron_matrix: [ 1.257623, 0.000000, 0.000000,
                                0.000000, 1.257623, 0.000000,
                                0.000000, 0.000000, 1.000000 ]
            axis_sign: [ -1.0, -1.0, +1.0 ]
            mag_cov: 100.0
            b_mag_init_cov: 1.0e6
            b_mag_proc_cov: 0.001
            innovation_gate_sigma: 3.0
            mag_timeout: 0.25

        publish:
            path_en:  false
            scan_publish_en:  true
            dense_publish_en: true
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: false
            interval: -1
