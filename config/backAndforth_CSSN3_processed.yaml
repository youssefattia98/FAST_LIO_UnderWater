/**:
    ros__parameters:
        # Maximum IEKF scan-to-map correction iterations per LiDAR/sonar frame.
        max_iteration: 16
        # Voxel leaf size in meters for downsampling the current scan before matching.
        filter_size_surf: 0.3
        # Voxel leaf size in meters for downsampling points inserted into the map/ikd-tree.
        filter_size_map: 0.3
        cube_side_length: 100.0
        map_file_path: "./test.pcd"

        common:
            lid_topic:  "/sonar_point_cloud"               
            imu_topic:  "/auv/imu/data_raw"
            world_frame: "World"
            

            # backAndforth_CSSN3_processed
            world_to_camera_init_T: [ -5.140, -3.843, -0.330 ]
            world_to_camera_init_R: [ 0.469503040, -0.882815819,  0.014252208,
                                    0.882753813,  0.469024500, -0.027599339,
                                    0.017680498,  0.025539164,  0.999517459 ]
            gravity_m_s2: 9.81

        preprocess:
            blind: 0.2

        mapping:
            noiseless_imu: false

            b_acc_cov: 0.2
            b_gyr_cov: 0.000001
            # init_b_acc_cov: 0.001
            # init_b_gyr_cov: 0.0001
            # init_grav_cov: 0.00001


            acc_cov: 0.1
            gyr_cov: 0.000001
            laser_point_cov: 0.1
            fov_degree:    90.0
            det_range:     15.0
            extrinsic_T: [ 0.09382, -0.02148, 0.11593 ]
            extrinsic_R: [ 0.994521895, 0.0, 0.104528463,
                0.0,         1.0, 0.0,
                -0.104528463, 0.0, 0.994521895 ]

        dvl:
            enable: true
            topic: "/auv/dvl"
            extrinsic_T: [ -0.079, -0.09691, -0.25938 ]
            extrinsic_R: [ 1., 0., 0.,
                           0., 1., 0.,
                           0., 0., 1. ]
            dvl_timeout: 0.55
            velocity_cov: 1.0e-4
            innovation_gate_sigma: 0.0
            bias_init_cov: 1.0e-8

        pressure:
            enable: true
            topic: "/auv/pressure/scaled2"
            extrinsic_T: [ -0.24219, -0.03954, 0.01898 ]
            pressure_timeout: 0.25
            pressure_cov: 1.0e-10
            innovation_gate_sigma: 3.0

        magnetometer:
            enable: true
            topic: "/auv/imu/magnetic_field"
            earth_field_imu: [ -279.57, 148.45, 513.70 ]
            hard_iron_offset: [ -0.30, -19.96, 86.70 ]
            soft_iron_matrix: [ -1.257623, 0.000000, 0.000000,
                                 0.000000, -1.257623, 0.000000,
                                 0.000000,  0.000000, -1.000000 ]
            mag_cov: 100.0
            b_mag_init_cov: 1.0e6
            b_mag_proc_cov: 0.001
            innovation_gate_sigma: 3.0
            mag_timeout: 0.25

        publish:
            path_en:  false
            scan_publish_en:  true
            dense_publish_en: true
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: false
            interval: -1
